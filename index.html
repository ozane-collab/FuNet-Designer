<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuNet Designer</title>
    <style>
        :root {
            --primary: #FC3424;
            --bg-light: #F6F6F6;
            --card-light: #FFFFFF;
            --text-light: #000000;
            --bg-dark: #121212;
            --card-dark: #1E1E1E;
            --text-dark: #FFFFFF;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .phone-container {
            width: 100%;
            max-width: 390px;
            height: 100vh;
            max-height: 740px;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* Splash Screen */
        .splash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.4s ease;
        }
        .splash h1 { color: white; font-size: 56px; margin: 0; font-weight: bold; }
        .splash p { color: white; font-size: 26px; margin: 0; font-style: italic; }

        /* Headers */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: var(--card-light);
        }
        .header h2 { margin: 0; color: var(--primary); font-size: 32px; }
        .header p { margin: 0; font-size: 14px; font-weight: bold; font-style: italic; }

        /* Cards */
        .services-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px 15px;
        }
        .card {
            background-color: var(--card-light);
            border-radius: 20px;
            width: 160px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .card .icon { font-size: 38px; color: var(--primary); margin-bottom: 8px; }
        .card h3 { margin: 0; font-size: 14px; }
        .card p { margin: 4px 0 0 0; font-size: 10px; color: #888; }

        /* Buttons */
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            margin: 10px auto;
            display: block;
        }

        /* Dark Mode Configurations */
        body.dark-mode { background-color: var(--bg-dark); color: var(--text-dark); }
        body.dark-mode .phone-container { background-color: var(--bg-dark); }
        body.dark-mode .header, body.dark-mode .card { background-color: var(--card-dark); }
        body.dark-mode .header p { color: var(--text-dark); }
        body.dark-mode .card h3 { color: var(--text-dark); }

        .hidden { display: none !important; }
        .page { padding: 15px; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- SPLASH SCREEN -->
        <div id="splash-screen" class="splash">
            <h1>FuNet</h1>
            <p>Designer</p>
        </div>

        <!-- MAIN PAGE -->
        <div id="main-page" class="page hidden">
            <div class="header">
                <div>
                    <h2 id="logo-text">FuNet</h2>
                    <p id="subtitle-text">Designer</p>
                </div>
                <button onclick="showPage('profile-page')" style="background:none; border:none; font-size:24px; cursor:pointer;">👤</button>
            </div>

            <div class="services-row">
                <div class="card" onclick="openOrder('3D Design')">
                    <div class="icon">📐</div>
                    <h3 class="svc-3d-title">3D Design</h3>
                    <p class="svc-3d-desc">Architectural Plans</p>
                </div>
                <div class="card" onclick="openOrder('Renovation')">
                    <div class="icon">🛠️</div>
                    <h3 class="svc-ren-title">Renovation</h3>
                    <p class="svc-ren-desc">Modern Materials</p>
                </div>
            </div>

            <button class="btn" onclick="showPage('login-page')" id="login-trigger-btn">Login to Order</button>
        </div>

        <!-- LOGIN PAGE -->
        <div id="login-page" class="page hidden">
            <button onclick="showPage('main-page')">⬅️ Back</button>
            <h2>Welcome to FuNet</h2>
            <input type="text" id="username" placeholder="Full Name" style="padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ccc;">
            <input type="text" id="phone" value="+251" style="padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ccc;">
            <button class="btn" onclick="doLogin()">Login & Continue 🚀</button>
        </div>

        <!-- PROFILE PAGE -->
        <div id="profile-page" class="page hidden">
            <button onclick="showPage('main-page')">⬅️ Back</button>
            <h2>My Profile</h2>
            <div id="profile-info">Please login to see your profile.</div>
            
            <hr>
            <h3>Settings</h3>
            <label>
                Dark Theme Mode: 
                <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode(this)">
            </label>
        </div>
    </div>

    <script>
        // Splash Screen fade out
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
            }, 400);
        }, 1500);

        let userState = { loggedIn: false, name: '', phone: '', darkMode: false };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        }

        function doLogin() {
            const name = document.getElementById('username').value;
            const phone = document.getElementById('phone').value;
            if(name.trim() && phone.length > 8) {
                userState.loggedIn = true;
                userState.name = name;
                userState.phone = phone;
                document.getElementById('profile-info').innerHTML = `<b>Name:</b> ${name} <br> <b>Phone:</b> ${phone}`;
                document.getElementById('login-trigger-btn').classList.add('hidden');
                showPage('main-page');
            } else {
                alert('Please enter correct details!');
            }
        }

        function openOrder(service) {
            if(!userState.loggedIn) {
                showPage('login-page');
            } else {
                alert('Opening form for: ' + service);
            }
        }

        function toggleDarkMode(checkbox) {
            userState.darkMode = checkbox.checked;
            if(userState.darkMode) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }
    </script>
</body>
</html>
